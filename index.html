<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美食地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css?v=1.9" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fbc531">
    </head>
    <body>
    <div id="map"></div>

    <div id="ui-overlay">
        <!-- 頂部標題與狀態列 -->
        <div class="top-bar">
            <div class="title-group">
                <h1>FOOD MAP</h1>
                <span class="sub-title">Food Finder App</span>
            </div>
            <div class="top-right-group">
                <button id="btn-help" class="btn-help" title="使用說明">?</button>
                <button id="btn-manual-top" class="btn-manual-mode">手動定位</button>
                <div id="status-display" class="status-badge-new">自動 GPS 定位</div>
            </div>
        </div>

        <!-- 使用說明 Modal -->
        <div id="help-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2>使用說明</h2>
                <div class="help-body">
                    <p><strong>自動定位：</strong> 預設開啟，地圖會跟隨您的 GPS 位置。</p>
                    <p><strong>手動定位：</strong> 點擊上方按鈕後，點擊地圖任一點可設定虛擬位置。</p>
                    <p><strong>最近目標：</strong> 點擊右側箭頭按鈕，自動找尋離您最近的美食點。</p>
                    <p><strong>自由瀏覽：</strong> 拖動地圖會停止自動跟隨，點擊右下角準星按鈕可重新恢復跟隨。</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <!-- 導航至最近目標 (箭頭) -->
            <button id="btn-nearest" title="最近目標">
                <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </button>
            <!-- 自動 GPS 定位 (準星) -->
            <button id="btn-locate" title="自動定位">
                <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            </button>
        </div>

        <div id="info-panel" class="panel hidden">
            <div class="drag-handle"></div>
            <div class="panel-content">
                <h2 id="store-name">店名</h2>
                <div class="stats">
                    <span id="store-distance">0.0 km</span>
                    <span class="separator">|</span>
                    <span id="store-time">約 0 分鐘</span>
                </div>
                <p id="store-address" class="address selectable">地址</p>
                <div class="store-details">
                    <div id="store-phone" class="phone-info">電話</div>
                    <span id="store-hours">營業時間</span>
                </div>
                <div class="actions">
                    <a id="btn-link" href="#" target="_blank" class="btn btn-secondary">食記連結</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js?v=1.9"></script>
    </body></html>
