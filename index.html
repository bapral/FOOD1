<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma 美食地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF9F43">
</head>
<body>
    <div id="map"></div>
    
    <div id="ui-overlay">
        <div class="top-bar">
            <h1>ALMA FOOD MAP</h1>
            <div id="status-badge" class="badge">GPS</div>
        </div>
        
        <div class="controls">
            <button id="btn-locate" title="自動定位">📍</button>
            <button id="btn-manual" title="手動選點">🎯</button>
        </div>

        <div id="info-panel" class="panel hidden">
            <div class="drag-handle"></div>
            <div class="panel-content">
                <h2 id="store-name">店名</h2>
                <p id="store-address" class="address">地址</p>
                <div class="store-details">
                    <span id="store-hours">營業時間</span>
                </div>
                <div class="actions">
                    <a id="btn-call" href="#" class="btn btn-primary">撥打電話</a>
                    <a id="btn-link" href="#" target="_blank" class="btn btn-secondary">食記連結</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
