<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma 美食地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fbc531">
</head>
<body>
    <div id="map"></div>
    
    <div id="ui-overlay">
        <div id="top-header" class="top-bar clickable">
            <div class="title-group">
                <h1>ALMA FOOD MAP</h1>
                <span class="sub-title">點此手動定位</span>
            </div>
            <div id="status-display" class="status-text">自動 GPS 定位</div>
        </div>
        
        <div class="controls">
            <!-- 導航至最近目標 (箭頭) -->
            <button id="btn-nearest" title="最近目標">
                <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </button>
            <!-- 自動 GPS 定位 (準星) -->
            <button id="btn-locate" title="自動定位">
                <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            </button>
        </div>

        <div id="info-panel" class="panel hidden">
            <div class="drag-handle"></div>
            <div class="panel-content">
                <h2 id="store-name">店名</h2>
                <div class="stats">
                    <span id="store-distance">0.0 km</span>
                    <span class="separator">|</span>
                    <span id="store-time">約 0 分鐘</span>
                </div>
                <p id="store-address" class="address selectable">地址</p>
                <div class="store-details">
                    <span id="store-hours">營業時間</span>
                </div>
                <div class="actions">
                    <a id="btn-call" href="#" class="btn btn-primary">撥打電話</a>
                    <a id="btn-link" href="#" target="_blank" class="btn btn-secondary">食記連結</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
